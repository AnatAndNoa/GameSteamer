<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Login Page</title>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="../Scripts/ajaxCalls.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #1f3b2d;
        }

        .container {
            width: 420px;
            margin: 100px auto;
            background-color: #f8f3e8;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
        }

        h1, h3 {
            color: #1f3b2d;
        }

        .row {
            text-align: left;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: #2f5a43;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }

        #msg {
            margin-top: 10px;
            color: red;
        }

        .link {
            margin-top: 15px;
        }

            .link a {
                cursor: pointer;
                text-decoration: underline;
            }

        #guestLink {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: #1f3b2d;
            text-decoration: underline;
            cursor: pointer;
        }

        #registerBox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .registerForm {
            background: #f8f3e8;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
        }
    </style>

    <script>
        $(document).ready(function () {

            $("#loginForm").submit(loginFunc);
            $("#registerForm").submit(registerFunc);

            $("#openRegister").click(function () {
                $("#registerBox").css("display", "flex");
            });

            $("#closeRegister").click(function () {
                $("#registerBox").hide();
            });

            $("#guestLink").click(function () {
                localStorage.removeItem("user");
                window.location.href = "index.html";
            });
        });

        function loginFunc(e) {
            e.preventDefault();

            let email = $("#email").val();
            let password = $("#password").val();

            let user = {
                Id: 0,
                Name: "",
                Email: email,
                Password: password,
                Active: true
            };

            let api = "https://proj.ruppin.ac.il/cgroup30/test2/tar1/api/Users/login";

            ajaxCall("POST", api, JSON.stringify(user),
                function (userFromServer) {
                    localStorage.setItem("user", JSON.stringify(userFromServer));
                    window.location.href = "index.html";
                },
                function () {
                    $("#msg").html("Invalid email or password");
                });
        }

        function registerFunc(e) {
            e.preventDefault();

            let id = $("#regId").val();
            let name = $("#regName").val();
            let email = $("#regEmail").val();
            let password = $("#regPassword").val();

            let nameRegex = /^[A-Za-z]{2,}$/;
            let passwordRegex = /^(?=.*[A-Z])(?=.*[0-9]).{8,}$/;

            if (!nameRegex.test(name)) {
                alert("Name not valid");
                return;
            }

            if (!passwordRegex.test(password)) {
                alert("Password not valid");
                return;
            }

            let user = {
                Id: id,
                Name: name,
                Email: email,
                Password: password,
                Active: true
            };

            let api = "https://proj.ruppin.ac.il/cgroup30/test2/tar1/api/Users";

            ajaxCall("POST", api, JSON.stringify(user),
                function () {
                    alert("Registered!");
                    $("#registerBox").hide();
                    $("#registerForm")[0].reset();
                },
                function () {
                    alert("User exists or error");
                });
        }
    </script>
</head>

<body>

    <div class="container">
        <h1>Hello! please login here</h1>

        <form id="loginForm">

            <div class="row">
                <input type="text" id="email" required placeholder="Email">
            </div>

            <div class="row">
                <input type="password" id="password" required placeholder="Password">
            </div>

            <button type="submit">SUBMIT</button>

        </form>

        <div class="link">
            Not registered yet?
            <a id="openRegister">Click here</a>
        </div>

        <div id="guestLink">continue as a guest</div>

        <div id="msg"></div>
    </div>

    <div id="registerBox">
        <div class="registerForm">

            <h3>Register</h3>

            <form id="registerForm">

                <div class="row">
                    <input type="text" id="regId" required placeholder="ID">
                </div>

                <div class="row">
                    <input type="text" id="regName" required placeholder="Name">
                </div>

                <div class="row">
                    <input type="text" id="regEmail" required placeholder="Email">
                </div>

                <div class="row">
                    <input type="password" id="regPassword" required placeholder="Password">
                </div>

                <button type="submit">REGISTER</button>
                <button type="button" id="closeRegister">CLOSE</button>

            </form>

        </div>
    </div>

</body>
</html>
